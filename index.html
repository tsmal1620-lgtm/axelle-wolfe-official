<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axelle Wolfe | Official Site</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
    </style>
</head>

<body class="bg-neutral-950 text-white font-sans"
      x-data="{
        lang: 'FR',
        isBookingOpen: false,
        scrolled: false,
        selectedMedia: null,
        content: {
            EN: {
                nav: ['HOME', 'BIO', 'MEDIA', 'SHOWS', 'BOOKING'],
                hero: {
                    title: 'AXELLE WOLFE',
                    subtitle: 'The Multifaceted Force of Nature.',
                    cta: 'BOOK NOW'
                },
                booking: {
                    title: 'READY TO ELECTRIFY?'
                }
            },
            FR: {
                nav: ['ACCUEIL', 'BIO', 'GALERIE', 'SPECTACLES', 'RÉSERVATION'],
                hero: {
                    title: 'AXELLE WOLFE',
                    subtitle: 'La Force de la Nature aux Multiples Visages.',
                    cta: 'RÉSERVEZ'
                },
                booking: {
                    title: 'PRÊT POUR L\'ÉLECTRIQUE?'
                }
            }
        }
      }"
      @scroll.window="scrolled = (window.pageYOffset > 50)">

<!-- NAV -->
<nav class="fixed w-full z-50 transition-all duration-300"
     :class="scrolled ? 'bg-black/90 backdrop-blur-md py-3' : 'bg-transparent py-6'">

    <div class="container mx-auto px-6 flex justify-between items-center">

        <div class="flex items-center gap-2 cursor-pointer" @click="window.scrollTo(0,0)">
            <div class="text-yellow-400"><i data-lucide="zap"></i></div>
            <span class="text-2xl font-black italic">AXELLE WOLFE</span>
        </div>

        <div class="hidden md:flex items-center gap-8">
            <template x-for="(item, index) in content[lang].nav">
                <a :href="'#' + ['home','about','media','booking'][index]"
                   class="text-sm font-bold tracking-widest hover:text-yellow-400 uppercase"
                   x-text="item"></a>
            </template>

            <button @click="lang = (lang === 'EN' ? 'FR' : 'EN')"
                    class="border px-3 py-1 rounded-full text-xs font-bold">
                <span x-text="lang"></span>
            </button>
        </div>

    </div>
</nav>

<!-- HERO -->
<section id="home" class="relative h-screen flex items-center justify-center bg-black">

    <div class="absolute inset-0 opacity-40">
        <img src="YellowWithBackground.jpg"
             class="w-full h-full object-cover brightness-50">
    </div>

    <div class="relative z-10 text-center px-6">
        <h1 class="text-6xl md:text-9xl font-black italic mb-4">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-white to-yellow-500"
                  x-text="content[lang].hero.title"></span>
        </h1>

        <p class="text-xl md:text-3xl mb-8"
           x-text="content[lang].hero.subtitle"></p>

        <button @click="isBookingOpen = true"
                class="px-10 py-4 bg-yellow-400 text-black font-black hover:bg-white">
            <span x-text="content[lang].hero.cta"></span>
        </button>
    </div>
</section>

<!-- BIO -->
<section id="about" class="py-20 px-4 bg-black">
    <div class="max-w-4xl mx-auto">

        <h2 class="text-5xl font-black text-center mb-12 uppercase"
            x-text="content[lang].nav[1]"></h2>

        <div class="space-y-6 text-lg text-gray-300">

            <template x-if="lang === 'EN'">
                <div>
                    <p><span class="text-pink-500 font-bold">Axelle Wolfe</span> is a rising powerhouse of the Quebec drag scene, known for high-energy performances and avant-garde style.</p>
                    <p>A fierce competitor, she earned <span class="text-yellow-400">Relève de l'Année</span> in 2023 and continues to dominate major competitions across Canada.</p>
                </div>
            </template>

            <template x-if="lang === 'FR'">
                <div>
                    <p><span class="text-pink-500 font-bold">Axelle Wolfe</span> est une force montante de la scène drag québécoise, reconnue pour ses performances électrisantes.</p>
                    <p>Elle a remporté le prix <span class="text-yellow-400">Relève de l'Année</span> en 2023 et continue de briller à travers le Canada.</p>
                </div>
            </template>

        </div>
    </div>
</section>

<!-- MEDIA -->
<section id="media" class="py-20">
    <div class="container mx-auto px-6 grid md:grid-cols-3 gap-6">

        <img src="RealPink.png" class="rounded-xl cursor-pointer" @click="selectedMedia='RealPink.png'">
        <img src="AnimePink.png" class="rounded-xl cursor-pointer" @click="selectedMedia='AnimePink.png'">
        <img src="YellowWithBackground.jpg" class="rounded-xl cursor-pointer" @click="selectedMedia='YellowWithBackground.jpg'">

    </div>
</section>

<!-- BOOKING -->
<section id="booking" class="py-20 text-center">

    <h2 class="text-5xl font-black mb-6">BOOKING</h2>

    <button @click="isBookingOpen = true"
            class="bg-pink-500 px-8 py-4 font-bold hover:bg-yellow-400 hover:text-black">
        OPEN
    </button>

</section>

<!-- MODAL -->
<div x-show="isBookingOpen" x-cloak
     class="fixed inset-0 bg-black/90 flex items-center justify-center">

    <div class="bg-neutral-900 p-10 rounded-xl">

        <button @click="isBookingOpen=false" class="mb-4">X</button>

        <h3 class="text-2xl mb-4"
            x-text="content[lang].booking.title"></h3>

        <form class="space-y-4">
            <input placeholder="Name" class="w-full p-2 text-black">
            <input placeholder="Email" class="w-full p-2 text-black">
            <textarea placeholder="Message" class="w-full p-2 text-black"></textarea>
            <button class="bg-pink-500 px-6 py-2">Send</button>
        </form>

    </div>
</div>

<!-- IMAGE MODAL -->
<div x-show="selectedMedia" x-cloak
     class="fixed inset-0 bg-black/90 flex items-center justify-center"
     @click="selectedMedia=null">

    <img :src="selectedMedia" class="max-h-[90vh]">
</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
