<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axelle Wolfe | Official Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        .bg-electric-yellow { background-color: #facc15; }
        .text-electric-yellow { color: #facc15; }
        .border-pink-vibe { border-color: #ec4899; }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans selection:bg-pink-500 selection:text-white" 
      x-data="{ 
        lang: 'FR', 
        isMenuOpen: false, 
        isBookingOpen: false, 
        scrolled: false,
        selectedMedia: null,
        content: {
            EN: {
                nav: ['HOME', 'BIO', 'MEDIA', 'SHOWS', 'BOOKING'],
                hero: { title: 'AXELLE WOLFE', subtitle: 'The Multifaceted Force of Nature.', cta: 'BOOK NOW' },
                about: { title: 'THE CHAMELEON', bio: 'Born in the heart of Quebec, Axelle Wolfe merges technical makeup mastery with high-energy choreography. Her style, \'Electric Precision,\' defines Canada\'s premier nightlife.' },
                shows: { title: 'UPCOMING APPEARANCES', subtitle: 'Catch the shockwave live.' },
                booking: { title: 'READY TO ELECTRIFY?', button: 'OPEN FORM' }
            },
            FR: {
                nav: ['ACCUEIL', 'BIO', 'GALERIE', 'SPECTACLES', 'RÉSERVATION'],
                hero: { title: 'AXELLE WOLFE', subtitle: 'La Force de la Nature aux Multiples Visages.', cta: 'RÉSERVEZ MAINTENANT' },
                about: { title: 'LE CAMÉLÉON', bio: 'Née au cœur du Québec, Axelle Wolfe fusionne la maîtrise du maquillage et la chorégraphie survoltée. Son style \'Précision Électrique\' est une figure incontournable de la scène canadienne.' },
                shows: { title: 'PROCHAINES DATES', subtitle: 'Vivez le choc électrique en direct.' },
                booking: { title: 'PRÊT POUR L\'ÉLECTRIQUE?', button: 'OUVRIR LE FORMULAIRE' }
            }
        }
      }"
      @scroll.window="scrolled = (window.pageYOffset > 50)">

    <nav class="fixed w-full z-50 transition-all duration-300" :class="scrolled ? 'bg-black/90 backdrop-blur-md py-3' : 'bg-transparent py-6'">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" @click="window.scrollTo(0,0)">
                <div class="text-yellow-400"><i data-lucide="zap"></i></div>
                <span class="text-2xl font-black tracking-tighter italic">AXELLE WOLFE</span>
            </div>

            <div class="hidden md:flex items-center gap-8">
                <template x-for="(item, index) in content[lang].nav">
                    <a :href="'#' + ['home','about','media','shows','booking'][index]" class="text-sm font-bold tracking-widest hover:text-yellow-400 transition-colors uppercase" x-text="item"></a>
                </template>
                <button @click="lang = (lang === 'EN' ? 'FR' : 'EN')" class="border border-white/20 px-3 py-1 rounded-full text-xs font-bold uppercase hover:bg-white hover:text-black">
                    <span x-text="lang"></span>
                </button>
            </div>
        </div>
    </nav>

    <section id="home" class="relative h-screen flex items-center justify-center overflow-hidden bg-black">
        <div class="absolute inset-0 opacity-40">
            <img src="YellowWithBackground.jpg" class="w-full h-full object-cover grayscale-[20%] brightness-50" alt="Axelle Wolfe Hero">
        </div>
        <div class="container mx-auto px-6 relative z-10 text-center">
            <h1 class="text-6xl md:text-9xl font-black italic tracking-tighter mb-4">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-white to-pink-500 uppercase" x-text="content[lang].hero.title"></span>
            </h1>
            <p class="text-xl md:text-3xl font-light tracking-wide max-w-2xl mx-auto mb-10" x-text="content[lang].hero.subtitle"></p>
            <button @click="isBookingOpen = true" class="px-10 py-4 bg-yellow-400 text-black font-black tracking-widest text-lg hover:bg-white transition-all shadow-lg" x-text="content[lang].hero.cta"></button>
        </div>
    </section>

    <section id="about" class="py-24 bg-white text-black">
        <div class="container mx-auto px-6 grid md:grid-cols-2 gap-16 items-center">
            <div class="space-y-8">
                <h2 class="text-5xl font-black italic flex items-center gap-4">
                    <span class="w-12 h-1 bg-yellow-400"></span>
                    <span x-text="content[lang].about.title"></span>
                </h2>
                <p class="text-xl leading-relaxed" x-text="content[lang].about.bio"></p>
                <div class="flex gap-4">
                    <a href="#" class="p-4 bg-neutral-100 rounded-full hover:bg-pink-500 hover:text-white transition-all"><i data-lucide="instagram"></i></a>
                    <a href="#" class="p-4 bg-neutral-100 rounded-full hover:bg-yellow-400 transition-all"><i data-lucide="video"></i></a>
                </div>
            </div>
            <div class="relative">
                <img src="Screenshot_20251228-183608.jpg" class="rounded-3xl shadow-2xl w-full" alt="Axelle Bio">
            </div>
        </div>
    </section>

    <section id="media" class="py-24 bg-neutral-950">
        <div class="container mx-auto px-6">
            <h2 class="text-6xl font-black italic mb-16 text-center text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-yellow-400 uppercase" x-text="content[lang].nav[2]"></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="overflow-hidden rounded-2xl border border-white/10 group cursor-pointer" @click="selectedMedia = 'Image-86.jpg'">
                    <img src="Image-86.jpg" class="w-full hover:scale-105 transition-transform duration-500" alt="Yellow Performance">
                </div>
                <div class="overflow-hidden rounded-2xl border border-white/10 group cursor-pointer" @click="selectedMedia = 'PinkNoBackground.jpg'">
                    <img src="PinkNoBackground.jpg" class="w-full hover:scale-105 transition-transform duration-500" alt="Pink Studio">
                </div>
                <div class="overflow-hidden rounded-2xl border border-white/10 group cursor-pointer" @click="selectedMedia = 'YellowWithBackground.jpg'">
                    <img src="YellowWithBackground.jpg" class="w-full hover:scale-105 transition-transform duration-500" alt="Yellow Studio">
                </div>
            </div>
        </div>
    </section>

    <div x-show="isBookingOpen" x-cloak class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="bg-neutral-900 p-12 rounded-[2rem] border border-white/10 max-w-lg w-full relative">
            <button @click="isBookingOpen = false" class="absolute top-6 right-6"><i data-lucide="x"></i></button>
            <h3 class="text-3xl font-black italic uppercase text-yellow-400 mb-6" x-text="content[lang].booking.title"></h3>
            <form action="https://formspree.io/f/xwvazepz" method="POST" class="space-y-4">
                <input name="name" required type="text" placeholder="Name / Nom" class="w-full bg-white/5 p-4 rounded-xl border border-white/10">
                <input name="email" required type="email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10">
                <textarea name="message" placeholder="Event Details / Détails" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 h-32"></textarea>
                <button type="submit" class="w-full bg-pink-500 py-4 font-black uppercase tracking-widest hover:bg-yellow-400 hover:text-black transition-colors">Send / Envoyer</button>
            </form>
        </div>
    </div>

    <div x-show="selectedMedia" x-cloak class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4" @click="selectedMedia = null">
        <img :src="selectedMedia" class="max-h-[90vh] max-w-full rounded-lg shadow-2xl">
    </div>

    <footer class="py-12 border-t border-white/5 text-center">
        <p class="text-xs font-bold opacity-30 tracking-[0.3em]">© 2026 AXELLE WOLFE | MADE IN QUÉBEC</p>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
